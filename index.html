<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>routetools</title>
  <meta name="description" content="Browser-based route editor for GPX / KML / KMZ / TCX. Add POIs and convert formats, all in your browser.">

  <!-- Open Graph -->
  <meta property="og:title" content="routetools">
  <meta property="og:description" content="Browser-based route editor for GPX / KML / KMZ / TCX. Add POIs and convert formats, all in your browser.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ysait0.github.io/routetools-webapp/">
  <meta property="og:image" content="https://ysait0.github.io/routetools-webapp/favicon.svg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="routetools">
  <meta name="twitter:description" content="Browser-based route editor for GPX / KML / KMZ / TCX.">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1 id="app-title" data-i18n="header.title" title="クリックでリロード">routetools</h1>
    <span id="status" class="status" data-i18n="header.initial_status">ルートファイルを読み込んでください</span>
    <a class="version-badge" href="https://github.com/ysait0/routetools-webapp" target="_blank" rel="noopener">v1.8.0</a>
    <div class="lang-select">
      <select id="language-selector" aria-label="Language">
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <section class="intro">
        <p class="intro-features" data-i18n-html="intro.features">ルートファイル（GPX / KML / KMZ / TCX / FIT）の<strong>形式変換</strong>と<strong>POIの追加・編集</strong>ができます。</p>
        <p class="intro-readme">
          <a id="intro-readme-link" href="https://github.com/ysait0/routetools-webapp/blob/main/README.ja.md" target="_blank" rel="noopener" data-i18n="intro.read_more">詳しくはこちら</a>
        </p>
        <p class="intro-privacy" data-i18n="intro.privacy">ファイルはブラウザ内で処理され、サーバーには送信されません。</p>
      </section>
      <section>
        <h2 data-i18n="section.input_files">入力ファイル</h2>
        <div class="file-group">
          <div class="file-label">
            <span data-i18n="label.route_file">ルートファイル</span>
            <span class="info-icon" data-i18n-tooltip="tooltip.route_file" data-tooltip=""></span>
          </div>
          <label class="drop-zone-mini" id="route-drop-zone" for="route-file">
            <p class="default-text" data-i18n="dropzone.default">ドラッグ&ドロップ / クリックで選択</p>
            <p class="hint">GPX / KML / KMZ / TCX / FIT</p>
            <p class="loaded-file" id="route-filename"></p>
            <input type="file" id="route-file" accept=".gpx,.kml,.kmz,.tcx,.fit" hidden />
          </label>
        </div>
        <div class="file-group">
          <div class="file-label">
            <span data-i18n="label.poi_add">POI追加 (任意)</span>
            <span class="info-icon" data-i18n-tooltip="tooltip.poi_add" data-tooltip=""></span>
          </div>
          <label class="drop-zone-mini" id="poi-drop-zone" for="poi-file">
            <p class="default-text" data-i18n="dropzone.default">ドラッグ&ドロップ / クリックで選択</p>
            <p class="hint">GPX / KML / KMZ / TCX / FIT / CSV</p>
            <p class="loaded-file" id="poi-filename"></p>
            <input type="file" id="poi-file" accept=".gpx,.kml,.kmz,.tcx,.fit,.csv" hidden />
          </label>
        </div>
        <div id="route-info"></div>
        <div class="history-actions">
          <button class="btn btn-secondary" id="btn-undo" data-i18n="button.undo" disabled>元に戻す</button>
          <button class="btn btn-secondary" id="btn-redo" data-i18n="button.redo" disabled>やり直し</button>
        </div>
        <button class="btn btn-secondary" id="btn-reset" data-i18n="button.reset">リセット</button>
      </section>

      <section>
        <h2 data-i18n="section.output_options">出力オプション</h2>
        <div class="option-group">
          <label for="out-type" data-i18n="label.out_type">出力形式</label>
          <select id="out-type">
            <option value="TCX">TCX</option>
            <option value="GPX">GPX</option>
          </select>
        </div>
        <div class="option-group">
          <label for="tolerance">
            <span data-i18n="label.tolerance">許容距離 (m)</span>
            <span class="info-icon" data-i18n-tooltip="tooltip.tolerance" data-tooltip=""></span>
          </label>
          <input type="number" id="tolerance" value="100" min="0" step="10" />
        </div>
        <div class="option-group">
          <label for="force">
            <span data-i18n="label.force">Force</span>
            <span class="info-icon" data-i18n-tooltip="tooltip.force" data-tooltip=""></span>
          </label>
          <input type="checkbox" id="force" />
          <span class="option-caption" data-i18n="label.force_caption">最近傍点に配置</span>
        </div>
        <div class="option-group">
          <label for="reverse">
            <span data-i18n="label.reverse">逆走</span>
            <span class="info-icon" data-i18n-tooltip="tooltip.reverse" data-tooltip=""></span>
          </label>
          <input type="checkbox" id="reverse" />
          <span class="option-caption" data-i18n="label.reverse_caption">ルート方向を反転</span>
        </div>
        <button class="btn btn-primary" id="btn-download" data-i18n="button.download">ダウンロード</button>
      </section>

      <section class="poi-list">
        <h2 data-i18n="section.poi_list">POI一覧</h2>
        <p class="section-hint" data-i18n-html="hint.poi_list">ルート上を<strong>クリック</strong>でPOI追加。一覧の行またはマーカーを<strong>クリック</strong>で編集できます。</p>
        <button class="btn btn-danger" id="btn-remove-poi" data-i18n="button.remove_poi">POI全削除</button>
        <div class="poi-list-actions">
          <button class="btn btn-secondary" id="btn-add-start" data-i18n="button.add_start">スタート追加</button>
          <button class="btn btn-secondary" id="btn-add-goal" data-i18n="button.add_goal">ゴール追加</button>
        </div>
        <div class="poi-list-actions">
          <button class="btn btn-secondary" id="btn-auto-turn" data-i18n="button.auto_turn">右左折POIを自動追加 (beta)</button>
        </div>
        <div class="poi-list-actions">
          <button class="btn btn-secondary" id="btn-remove-auto" data-i18n="button.remove_auto">自動追加POIを削除</button>
        </div>
        <table>
          <thead>
            <tr>
              <th data-i18n="table.num">#</th>
              <th data-i18n="table.name">名前</th>
              <th data-i18n="table.description">説明</th>
              <th data-i18n="table.type">タイプ</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="poi-tbody">
            <tr><td colspan="5" class="empty" data-i18n="table.empty">POIなし</td></tr>
          </tbody>
        </table>
      </section>
    </aside>

    <div class="sidebar-resizer" id="sidebar-resizer" title="ドラッグで幅変更"></div>

    <div class="map-area">
      <div id="map"></div>
      <div id="elevation-profile" class="elevation-profile">
        <div class="elevation-header">
          <span class="elevation-title" data-i18n="section.elevation_profile">標高プロファイル</span>
          <span class="elevation-stats" id="elevation-stats"></span>
          <button class="btn-elevation-toggle" id="btn-elevation-toggle" data-i18n-title="tooltip.elevation_toggle" aria-label="Toggle elevation profile">&#9660;</button>
        </div>
        <div class="elevation-body">
          <div class="elevation-canvas-wrap">
            <canvas id="elevation-canvas"></canvas>
            <canvas id="elevation-overlay" class="elevation-overlay"></canvas>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <!-- fit-file-parser は parsers.js 内で動的 import (esm.sh) して利用 -->
  <script src="js/i18n.js"></script>
  <script src="js/geo.js"></script>
  <script src="js/parsers.js"></script>
  <script src="js/builders.js"></script>
  <script src="js/map.js"></script>
  <script src="js/elevation.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
